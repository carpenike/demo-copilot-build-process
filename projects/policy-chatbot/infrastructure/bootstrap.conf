# bootstrap.conf — Auto-generated by @5-deployment agent
# Defines which Azure services the policy-chatbot project requires.
# Sourced by: scripts/check-prerequisites.sh --from-config <this-file>
#
# DO NOT put secrets in this file — it is committed to the repo.
# Secrets are generated by the bootstrap script and stored in GitHub Secrets.

# ─── Feature Flags ──────────────────────────────────────────────────────────
# Azure OpenAI Service — project uses GPT-4o, GPT-4o-mini, and text-embedding-3-large
WITH_OPENAI=true

# Azure AI Search — project uses hybrid vector + keyword search for RAG
WITH_SEARCH=true

# Entra ID App Registration — project has user-facing SSO auth + admin RBAC
WITH_ENTRA_AUTH=true

# ─── Entra ID App Roles (requires WITH_ENTRA_AUTH=true) ─────────────────────
APP_ROLES='[
    {"allowedMemberTypes":["User"],"displayName":"Employee","isEnabled":true,"value":"Employee"},
    {"allowedMemberTypes":["User"],"displayName":"PolicyAdmin","isEnabled":true,"value":"PolicyAdmin"}
]'

# ─── Extra GitHub Secrets ───────────────────────────────────────────────────
# Beyond the core set (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
# ACR_LOGIN_SERVER, ACR_NAME, ACA_RESOURCE_GROUP), these additional secrets
# are needed:
EXTRA_SECRETS="POSTGRES_ADMIN_PASSWORD ENTRA_CLIENT_ID ENTRA_CLIENT_SECRET ACA_RESOURCE_GROUP_STAGING ACA_RESOURCE_GROUP_PROD"

# ─── Location Overrides ────────────────────────────────────────────────────
# Some Azure subscriptions restrict PostgreSQL Flexible Server in certain regions.
# Set this to override the database module's location parameter.
DATABASE_LOCATION=""
