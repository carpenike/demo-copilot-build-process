# bootstrap.conf — Auto-generated by @5-deployment agent
# Defines which Azure services the policy-chatbot project requires.
# Sourced by: scripts/check-prerequisites.sh --from-config <this-file>
#
# DO NOT put secrets in this file — it is committed to the repo.
# Secrets are generated by the bootstrap script and stored in GitHub Secrets.

# ─── Feature Flags ──────────────────────────────────────────────────────────
# Azure OpenAI Service — GPT-4o + text-embedding-ada-002 (ADR-0010)
WITH_OPENAI=true

# Azure AI Search — Hybrid retrieval for RAG pipeline (ADR-0010, ADR-0011)
WITH_SEARCH=true

# Entra ID App Registration — SSO for 8,000 employees (ADR-0012)
WITH_ENTRA_AUTH=true

# ─── Entra ID App Roles (requires WITH_ENTRA_AUTH=true) ─────────────────────
APP_ROLES='[
    {"allowedMemberTypes":["User"],"displayName":"Employee","isEnabled":true,"value":"Employee"},
    {"allowedMemberTypes":["User"],"displayName":"Administrator","isEnabled":true,"value":"Administrator"}
]'

# ─── Extra GitHub Secrets ───────────────────────────────────────────────────
# Beyond the core set (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
# ACR_LOGIN_SERVER, ACR_NAME, ACA_RESOURCE_GROUP_DEV/STAGING/PROD):
EXTRA_SECRETS="POSTGRES_ADMIN_PASSWORD ENTRA_TENANT_ID ENTRA_CLIENT_ID ENTRA_AUTHORITY"

# ─── Location Overrides ────────────────────────────────────────────────────
# Some subscriptions (e.g., Visual Studio/MSDN) restrict PostgreSQL Flexible
# Server in certain regions. Set this to deploy the database to a different
# region than the resource group.
DATABASE_LOCATION=""
