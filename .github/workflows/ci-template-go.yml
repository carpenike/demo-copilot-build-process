# CI Pipeline Template — Go
# Copy this file to .github/workflows/<project>-ci.yml and replace placeholders.
# All stages are REQUIRED. Do not remove stages without Platform Engineering approval.

name: CI — [Project Name] (Go)

on:
  pull_request:
    branches: [main]
    paths:
      - 'projects/[project-name]/src/**'
      - 'projects/[project-name]/tests/**'
  push:
    branches: [main]
    paths:
      - 'projects/[project-name]/src/**'

env:
  PROJECT: "[project-name]"
  GO_VERSION: "1.22"
  ACR_REGISTRY: "${{ secrets.ACR_LOGIN_SERVER }}"
  IMAGE_NAME: "[project-name]"

jobs:
  # ─── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: projects/${{ env.PROJECT }}/src

      - name: Run go vet
        run: go vet ./...
        working-directory: projects/${{ env.PROJECT }}/src

  # ─── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"
          threshold=80
          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: projects/${{ env.PROJECT }}/src/coverage.out

  # ─── Stage 3: Security ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Build image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan \
            projects/${{ env.PROJECT }}/src/

      - name: Run Microsoft Defender for Containers scan
        uses: microsoft/container-scan@v0
        with:
          image-name: '${{ env.IMAGE_NAME }}:scan'
          severity-threshold: 'HIGH'

  # ─── Stage 4: Build ───────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push
        run: |
          IMAGE_TAG="${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" projects/${{ env.PROJECT }}/src/
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

  # ─── Stage 5: Integration Tests ───────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration tests
        run: go test -v -tags=integration ./tests/integration/...
        working-directory: projects/${{ env.PROJECT }}/src
        env:
          DATABASE_URL: "postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable"
