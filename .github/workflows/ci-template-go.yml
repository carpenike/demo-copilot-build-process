# CI Pipeline Template — Go
# Copy this file to .github/workflows/<project>-ci.yml and replace placeholders.
# All stages are REQUIRED. Do not remove stages without Platform Engineering approval.

name: CI — [Project Name] (Go)

on:
  pull_request:
    branches: [main]
    paths:
      - 'projects/[project-name]/src/**'
      - 'projects/[project-name]/tests/**'
  push:
    branches: [main]
    paths:
      - 'projects/[project-name]/src/**'

env:
  PROJECT: "[project-name]"
  GO_VERSION: "1.22"
  ECR_REGISTRY: "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
  IMAGE_NAME: "[project-name]"

jobs:
  # ─── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: projects/${{ env.PROJECT }}/src

      - name: Run go vet
        run: go vet ./...
        working-directory: projects/${{ env.PROJECT }}/src

  # ─── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"
          threshold=80
          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: projects/${{ env.PROJECT }}/src/coverage.out

  # ─── Stage 3: Security ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Build image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan \
            projects/${{ env.PROJECT }}/src/

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # ─── Stage 4: Build ───────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE_TAG="${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" projects/${{ env.PROJECT }}/src/
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

  # ─── Stage 5: Integration Tests ───────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run integration tests
        run: go test -v -tags=integration ./tests/integration/...
        working-directory: projects/${{ env.PROJECT }}/src
        env:
          DATABASE_URL: "postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable"
