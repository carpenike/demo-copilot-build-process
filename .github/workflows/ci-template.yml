# CI Pipeline Template
# Copy this file to .github/workflows/<project>-ci.yml and replace placeholders.
# All stages are REQUIRED. Do not remove stages without Platform Engineering approval.

name: CI — [Project Name]

on:
  pull_request:
    branches: [main]
    paths:
      - 'projects/[project-name]/src/**'
      - 'projects/[project-name]/tests/**'
  push:
    branches: [main]
    paths:
      - 'projects/[project-name]/src/**'

env:
  PROJECT: "[project-name]"
  ACR_REGISTRY: "${{ secrets.ACR_LOGIN_SERVER }}"
  IMAGE_NAME: "[project-name]"

jobs:
  # ─── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python projects
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run ruff (lint + format)
        run: uv run ruff check . && uv run ruff format --check .
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run mypy (type check)
        run: uv run mypy .
        working-directory: projects/${{ env.PROJECT }}/src

  # ─── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: projects/${{ env.PROJECT }}/src/coverage.xml

  # ─── Stage 3: Security ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run GitHub Advanced Security dependency scan
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

      - name: Build image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan \
            projects/${{ env.PROJECT }}/src/

      - name: Run Microsoft Defender for Containers scan
        uses: Azure/container-scan@v0
        with:
          image-name: '${{ env.IMAGE_NAME }}:scan'
          severity-threshold: 'HIGH'

  # ─── Stage 4: Build & Push ────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: projects/${{ env.PROJECT }}/src
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 5: Integration Tests ───────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Run integration tests
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL=$DATABASE_URL \
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            make test-integration
