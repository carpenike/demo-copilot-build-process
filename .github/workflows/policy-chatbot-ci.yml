# CI — Policy Chatbot
# All 6 stages are REQUIRED per enterprise standards.

name: CI — Policy Chatbot

on:
  pull_request:
    branches: [main]
    paths:
      - 'projects/policy-chatbot/**'
  push:
    branches: [main]
    paths:
      - 'projects/policy-chatbot/**'

env:
  PROJECT: "policy-chatbot"
  PYTHON_VERSION: "3.11"
  ACR_REGISTRY: "${{ secrets.ACR_LOGIN_SERVER }}"
  IMAGE_NAME: "policy-chatbot"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run ruff (lint + format)
        run: ruff check app/ && ruff format --check app/
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run mypy (type check)
        run: mypy app/
        working-directory: projects/${{ env.PROJECT }}/src

  # ─── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run tests with coverage
        env:
          POLICY_CHATBOT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/testdb"
          POLICY_CHATBOT_REDIS_URL: "redis://localhost:6379/0"
          POLICY_CHATBOT_BLOB_ACCOUNT_URL: "https://sttest.blob.core.windows.net"
          POLICY_CHATBOT_SEARCH_ENDPOINT: "https://test-search.search.windows.net"
          POLICY_CHATBOT_OPENAI_ENDPOINT: "https://test-openai.openai.azure.com"
          POLICY_CHATBOT_ENTRA_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          POLICY_CHATBOT_ENTRA_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          POLICY_CHATBOT_ENTRA_AUTHORITY: "https://login.microsoftonline.com/test"
          POLICY_CHATBOT_APPLICATIONINSIGHTS_CONNECTION_STRING: "InstrumentationKey=00000000-0000-0000-0000-000000000000"
        run: pytest ../tests/ --cov=app --cov-report=xml --cov-fail-under=80
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: projects/${{ env.PROJECT }}/src/coverage.xml

  # ─── Stage 3: Security ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Build image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan \
            projects/${{ env.PROJECT }}/src/

      - name: Run Microsoft Security DevOps scan
        uses: microsoft/security-devops-action@v1
        with:
          tools: trivy

  # ─── Stage 4: Build & Push ────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: projects/${{ env.PROJECT }}/src
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 5: Integration Tests ───────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run integration tests
        env:
          POLICY_CHATBOT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/testdb"
          POLICY_CHATBOT_REDIS_URL: "redis://localhost:6379/0"
          POLICY_CHATBOT_BLOB_ACCOUNT_URL: "https://sttest.blob.core.windows.net"
          POLICY_CHATBOT_SEARCH_ENDPOINT: "https://test-search.search.windows.net"
          POLICY_CHATBOT_OPENAI_ENDPOINT: "https://test-openai.openai.azure.com"
          POLICY_CHATBOT_ENTRA_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          POLICY_CHATBOT_ENTRA_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          POLICY_CHATBOT_ENTRA_AUTHORITY: "https://login.microsoftonline.com/test"
          POLICY_CHATBOT_APPLICATIONINSIGHTS_CONNECTION_STRING: "InstrumentationKey=00000000-0000-0000-0000-000000000000"
        run: pytest ../tests/integration/ -v
        working-directory: projects/${{ env.PROJECT }}/src

  # ─── Stage 6: Deploy to Dev (on PRs) ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.event_name == 'pull_request'
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep (dev)
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ secrets.ACA_RESOURCE_GROUP_DEV }}
          template: projects/${{ env.PROJECT }}/infrastructure/main.bicep
          parameters: >-
            projects/${{ env.PROJECT }}/infrastructure/main.dev.bicepparam
            imageTag=${{ github.sha }}
            acrLoginServer=${{ env.ACR_REGISTRY }}
            acrName=${{ secrets.ACR_NAME }}
            postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }}
            entraTenantId=${{ secrets.ENTRA_TENANT_ID }}
            entraClientId=${{ secrets.ENTRA_CLIENT_ID }}
            entraAuthority=${{ secrets.ENTRA_AUTHORITY }}
          deploymentMode: Incremental
          deploymentName: ${{ env.PROJECT }}-dev-${{ github.sha }}
        continue-on-error: true
        id: deploy

      - name: Assign AcrPull to ACA managed identities
        if: always() && steps.deploy.outcome != 'skipped'
        run: |
          ACR_ID=$(az acr show --name ${{ secrets.ACR_NAME }} --query id -o tsv 2>/dev/null || echo "")
          APP_NAME="${{ env.IMAGE_NAME }}-dev-api"
          PRINCIPAL_ID=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP_DEV }} \
            --query "identity.principalId" -o tsv 2>/dev/null || echo "")
          if [ -n "$PRINCIPAL_ID" ] && [ -n "$ACR_ID" ]; then
            echo "Assigning AcrPull to ${APP_NAME}..."
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role AcrPull --scope "$ACR_ID" \
              --output none 2>/dev/null || true
          fi
          echo "Waiting 30s for RBAC propagation..."
          sleep 30

      - name: Restart container app if first deploy failed (RBAC propagation)
        if: steps.deploy.outcome == 'failure'
        run: |
          APP_NAME="${{ env.IMAGE_NAME }}-dev-api"
          echo "Updating ${APP_NAME} to trigger new revision..."
          az containerapp update \
            --name "${APP_NAME}" \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP_DEV }} \
            --set-env-vars "DEPLOY_RETRY=$(date +%s)" \
            --output none 2>/dev/null || echo "${APP_NAME} not found — skipping"

      - name: Wait for revision to be ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show \
              --name ${{ env.IMAGE_NAME }}-dev-api \
              --resource-group ${{ secrets.ACA_RESOURCE_GROUP_DEV }} \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Pending")
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Container App provisioning succeeded"
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "Container App provisioning failed!"
              exit 1
            fi
            echo "Waiting for deployment... ($i/30, status=$STATUS)"
            sleep 10
          done

      - name: Run smoke tests
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.IMAGE_NAME }}-dev-api \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP_DEV }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          curl -sf "https://${FQDN}/health" || exit 1
          curl -s "https://${FQDN}/ready" || echo "Note: /ready returned non-200"
          echo "Dev smoke tests passed"
