name: CI — Policy Chatbot

on:
  pull_request:
    branches: [main]
    paths:
      - 'projects/policy-chatbot/**'
  push:
    branches: [main]
    paths:
      - 'projects/policy-chatbot/**'

env:
  PROJECT: "policy-chatbot"
  PYTHON_VERSION: "3.11"
  ACR_REGISTRY: "${{ secrets.ACR_LOGIN_SERVER }}"
  IMAGE_NAME: "policy-chatbot"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run ruff (lint + format)
        run: ruff check app/ && ruff format --check app/
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run mypy (type check)
        run: mypy app/
        working-directory: projects/${{ env.PROJECT }}/src

  # ─── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run tests with coverage
        env:
          POLICY_CHATBOT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/testdb"
          POLICY_CHATBOT_REDIS_URL: "redis://localhost:6379/0"
          POLICY_CHATBOT_AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          POLICY_CHATBOT_AZURE_SEARCH_ENDPOINT: "https://test.search.windows.net"
          POLICY_CHATBOT_AZURE_STORAGE_ACCOUNT_URL: "https://test.blob.core.windows.net"
          POLICY_CHATBOT_AZURE_TENANT_ID: "test-tenant-id"
          POLICY_CHATBOT_AZURE_CLIENT_ID: "test-client-id"
          POLICY_CHATBOT_DEBUG: "true"
        run: pytest ../tests/ --cov=app --cov-report=xml --cov-fail-under=80
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: projects/${{ env.PROJECT }}/src/coverage.xml

  # ─── Stage 3: Security ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Build image for scanning
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:scan \
            projects/${{ env.PROJECT }}/src/

      - name: Run Microsoft Security DevOps scan
        uses: microsoft/security-devops-action@v1
        with:
          tools: trivy

  # ─── Stage 4: Build & Push ────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: projects/${{ env.PROJECT }}/src
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 5: Integration Tests ───────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
        working-directory: projects/${{ env.PROJECT }}/src

      - name: Run integration tests
        env:
          POLICY_CHATBOT_DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/testdb"
          POLICY_CHATBOT_REDIS_URL: "redis://localhost:6379/0"
          POLICY_CHATBOT_AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          POLICY_CHATBOT_AZURE_SEARCH_ENDPOINT: "https://test.search.windows.net"
          POLICY_CHATBOT_AZURE_STORAGE_ACCOUNT_URL: "https://test.blob.core.windows.net"
          POLICY_CHATBOT_AZURE_TENANT_ID: "test-tenant-id"
          POLICY_CHATBOT_AZURE_CLIENT_ID: "test-client-id"
          POLICY_CHATBOT_DEBUG: "true"
        run: pytest ../tests/integration/ -x -q
        working-directory: projects/${{ env.PROJECT }}/src
