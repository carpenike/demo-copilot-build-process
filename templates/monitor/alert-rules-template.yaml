# Alert Rules Template — [Service Name]
# Produced by: Monitor Agent
# Standards: governance/enterprise-standards.md
#
# Every alert MUST have a runbook_url annotation.
# Thresholds MUST match SLO targets — do not use arbitrary round numbers.

groups:
  - name: <service>-slo
    rules:
      # ── Availability SLO ──────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{service="<service>", status=~"5.."}[5m])) /
          sum(rate(http_requests_total{service="<service>"}[5m])) > 0.001
        for: 5m
        labels:
          severity: critical
          service: "<service>"
        annotations:
          summary: "Error rate > 0.1% for 5 minutes (SLO: 99.9%)"
          runbook_url: "https://runbooks.internal/<service>#high-error-rate"

      # ── Latency SLO ──────────────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{service="<service>"}[5m])) by (le)
          ) > <threshold_seconds>
        for: 15m
        labels:
          severity: warning
          service: "<service>"
        annotations:
          summary: "p99 latency exceeds SLO threshold for 15 minutes"
          runbook_url: "https://runbooks.internal/<service>#high-latency"

      # ── Service Health ────────────────────────────────────────────────────
      - alert: ServiceDown
        expr: |
          up{service="<service>"} == 0
        for: 2m
        labels:
          severity: critical
          service: "<service>"
        annotations:
          summary: "No healthy instances of <service>"
          runbook_url: "https://runbooks.internal/<service>#service-down"

      - alert: PodRestartLoop
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="<namespace>", container="<service>"}[10m]) > 3
        for: 0m
        labels:
          severity: warning
          service: "<service>"
        annotations:
          summary: "Pod restarting > 3 times in 10 minutes"
          runbook_url: "https://runbooks.internal/<service>#pod-restart-loop"

      # ── Resource Saturation ───────────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: |
          container_memory_working_set_bytes{namespace="<namespace>", container="<service>"} /
          container_spec_memory_limit_bytes{namespace="<namespace>", container="<service>"} > 0.8
        for: 10m
        labels:
          severity: warning
          service: "<service>"
        annotations:
          summary: "Memory usage > 80% of limit for 10 minutes"
          runbook_url: "https://runbooks.internal/<service>#high-memory-usage"

      # ── Error Budget Burn Rate ────────────────────────────────────────────
      - alert: SLOBurnRateFast
        expr: |
          sum(rate(http_requests_total{service="<service>", status=~"5.."}[5m])) /
          sum(rate(http_requests_total{service="<service>"}[5m])) > 0.002
        for: 5m
        labels:
          severity: critical
          service: "<service>"
        annotations:
          summary: "Error budget burning at > 2x rate"
          runbook_url: "https://runbooks.internal/<service>#slo-burn-rate"

      - alert: SLOBurnRateSlow
        expr: |
          sum(rate(http_requests_total{service="<service>", status=~"5.."}[1h])) /
          sum(rate(http_requests_total{service="<service>"}[1h])) > 0.001
        for: 1h
        labels:
          severity: warning
          service: "<service>"
        annotations:
          summary: "Error budget burning at > 1x rate for 1 hour"
          runbook_url: "https://runbooks.internal/<service>#slo-burn-rate"
